<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fffafa;
  color: #1e293b;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 40px 20px;
}

.hero {
  text-align: center;
  margin-bottom: 40px;
}

.hero h1 {
  font-size: 42px;
}

.hero span {
  color: #fb7185;
  font-style: italic;
}

.subtitle {
  color: #64748b;
}

.tabs {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
}

.tabs button {
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  background: white;
  border: 1px solid #e2e8f0;
  cursor: pointer;
}

.card {
  background: white;
  border-radius: 20px;
  margin-bottom: 20px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,0.05);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 20px;
}

.time {
  font-size: 12px;
  color: #fb7185;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.desc {
  color: #64748b;
}

.routes {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
</style>

</head>

<body>

<div class="container">

<div class="hero">
  <h1>Nossa <span>Jornada</span></h1>
  <p class="subtitle">Jaraguá → Pirâmides → Volta</p>
</div>

<div class="tabs">
  <button onclick="setDay(1)">Sex</button>
  <button onclick="setDay(2)">Sáb</button>
  <button onclick="setDay(3)">Dom</button>
</div>

<div id="content"></div>

</div>

<script>
let day = 1;
let route = "aventura";

function setDay(d){
  day = d;
  render();
}

function setRoute(r){
  route = r;
  render();
}

function card(time,title,desc,img){
  return `
  <div class="card">
    ${img ? `<img src="${img}">` : ""}
    <div class="content">
      <div class="time">${time}</div>
      <div class="title">${title}</div>
      <div class="desc">${desc}</div>
    </div>
  </div>
  `;
}

function render(){
  const el = document.getElementById("content");

  if(day === 1){
    el.innerHTML = `
      ${card("17:30","Saída","Viagem até Braço do Norte")}
      ${card("23:00","Chegada","Descanso")}
    `;
  }

  if(day === 2){
    el.innerHTML = `
      ${card("09:30","Pirâmides","Explorar",
      "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1000&q=80")}
      ${card("Tarde","Trilha","Fotos")}
    `;
  }

  if(day === 3){
    el.innerHTML = `
      <div class="routes">
        <button onclick="setRoute('aventura')">Aventura</button>
        <button onclick="setRoute('tranquila')">Tranquila</button>
      </div>

      ${
        route === "aventura"
        ? `
        ${card("08:00","Corvo Branco","Mirantes",
        "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1000&q=80")}
        ${card("Almoço","Rio do Sul","Parada")}
        `
        : `
        ${card("Manhã","Saída leve","Sem pressa")}
        ${card("Tarde","Pomerode","Café",
        "https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1000&q=80")}
        `
      }
    `;
  }
}

render();
</script>

</body>
</html>
