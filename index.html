<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nossa Jornada</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #FFFCFC;
  color: #1e293b;
  overflow-x: hidden;
}

/* FUNDO */
body::before {
  content: "";
  position: fixed;
  top: -20%;
  right: -20%;
  width: 500px;
  height: 500px;
  background: #fecdd3;
  filter: blur(120px);
  opacity: 0.4;
  z-index: -1;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 60px 20px;
}

/* HERO */
.hero {
  text-align: center;
  margin-bottom: 60px;
}

.hero h1 {
  font-size: 64px;
  font-weight: 300;
}

.hero span {
  color: #fb7185;
  font-style: italic;
  font-family: serif;
}

.subtitle {
  color: #94a3b8;
}

/* DIAS */
.tabs {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 60px;
}

.tabs button {
  width: 70px;
  height: 70px;
  border-radius: 20px;
  border: 2px solid #ffe4e6;
  background: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.tabs button:hover {
  transform: scale(1.1);
}

.tabs button.active {
  background: #fb7185;
  color: white;
  box-shadow: 0 10px 25px rgba(251,113,133,0.3);
}

/* CARD */
.card {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.8);
  border-radius: 40px;
  border: 1px solid #ffe4e6;
  margin-bottom: 30px;
  overflow: hidden;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.content {
  padding: 30px;
}

.time {
  font-size: 11px;
  color: #fb7185;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.title {
  font-size: 26px;
  font-weight: 600;
  margin: 10px 0;
}

.desc {
  color: #64748b;
}

/* ROTAS */
.routes {
  display: flex;
  gap: 15px;
  margin-bottom: 30px;
}

.routes button {
  flex: 1;
  padding: 12px;
  border-radius: 30px;
  border: 1px solid #ffe4e6;
  background: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="hero">
  <h1>Nossa <span>Jornada</span></h1>
  <p class="subtitle">Jaraguá → Pirâmides → Volta</p>
</div>

<div class="tabs">
  <button onclick="setDay(1)">01</button>
  <button onclick="setDay(2)">02</button>
  <button onclick="setDay(3)">03</button>
</div>

<div id="content"></div>

</div>

<script>
let day = 1;
let route = "aventura";

function setDay(d){
  day = d;
  render();
}

function setRoute(r){
  route = r;
  render();
}

function card(time,title,desc,img){
  return `
  <div class="card">
    ${img ? `<img src="${img}">` : ""}
    <div class="content">
      <div class="time">${time}</div>
      <div class="title">${title}</div>
      <div class="desc">${desc}</div>
    </div>
  </div>
  `;
}

function render(){
  const el = document.getElementById("content");

  if(day === 1){
    el.innerHTML = `
      ${card("17:30","Saída de Jaraguá","Início da viagem até Braço do Norte")}
      ${card("23:00","Chegada","Check-in e descanso")}
    `;
  }

  if(day === 2){
    el.innerHTML = `
      ${card("09:30","Pirâmides","Explorar o local",
      "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1000&q=80")}
      ${card("Tarde","Trilha","Subida e fotos")}
      ${card("Noite","Descanso","Volta para o Airbnb")}
    `;
  }

  if(day === 3){
    el.innerHTML = `
      <div class="routes">
        <button onclick="setRoute('aventura')">Aventura</button>
        <button onclick="setRoute('tranquila')">Tranquila</button>
      </div>

      ${
        route === "aventura"
        ? `
        ${card("08:00","Serra do Corvo Branco","Subida com mirantes",
        "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1000&q=80")}
        ${card("Almoço","Rio do Sul","Parada para almoço")}
        ${card("Tarde","Pomerode","Parada rápida",
        "https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1000&q=80")}
        `
        : `
        ${card("Manhã","Saída tranquila","Sem pressa")}
        ${card("Almoço","Rio do Sul","Parada")}
        ${card("Tarde","Pomerode","Passeio com calma",
        "https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1000&q=80")}
        `
      }
    `;
  }

  // botão ativo
  document.querySelectorAll(".tabs button").forEach((btn, i) => {
    btn.classList.toggle("active", i + 1 === day);
  });
}

render();
</script>

</body>
</html>
